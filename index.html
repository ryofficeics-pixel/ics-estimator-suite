<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICS Estimator Suite — RAB Konstruksi</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== TOPBAR ===================== -->
  <header class="topbar">
    <div class="topbar-left">
      <button id="btnSidebarToggle" class="btn btn-ghost btn-icon" title="Tampilkan/sembunyikan menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <span class="brand">ICS <span>Estimator Suite</span></span>
    </div>

    <div class="topbar-center">
      <select id="projectSelect" class="select-project"></select>
      <button id="btnNewProject" class="btn btn-ghost btn-sm">+ Proyek</button>
      <button id="btnCloneProject" class="btn btn-ghost btn-sm">Duplikat</button>
      <button id="btnRenameProject" class="btn btn-ghost btn-sm">Ganti Nama</button>
      <button id="btnDeleteProject" class="btn btn-ghost btn-sm danger">Hapus</button>
    </div>

    <div class="topbar-right">
      <button id="btnMasterHarga" class="btn btn-secondary btn-sm">Master Harga</button>
      <button id="btnBackupExport" class="btn btn-secondary btn-sm">Backup</button>
      <button id="btnBackupImport" class="btn btn-secondary btn-sm">Restore</button>
      <input id="fileImport" type="file" accept="application/json" style="display:none" />
      <span class="divider"></span>
      <button id="btnPrint" class="btn btn-ghost btn-sm">Cetak</button>
      <button id="btnExportPDF" class="btn btn-ghost btn-sm">PDF</button>
      <button id="btnExportExcel" class="btn btn-ghost btn-sm">Excel</button>
      <button id="btnExportCSV" class="btn btn-ghost btn-sm">CSV</button>
      <button id="btnTheme" class="btn btn-ghost btn-icon" title="Mode gelap/terang">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </header>

  <div class="app-body">
    <!-- ===================== SIDEBAR ===================== -->
    <nav id="sidebar" class="sidebar"></nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">
      <div class="module-header">
        <h1 id="moduleTitle">Pondasi Footplat</h1>
        <p id="moduleSubtitle" class="muted-note"></p>
      </div>
      <div id="alertGlobal"></div>
      <div id="mainContent"></div>
    </main>
  </div>

  <!-- ===================== MODAL: MASTER HARGA ===================== -->
  <div id="masterHargaModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-head">
        <h2>Master Harga</h2>
        <div>
          <button id="btnResetHarga" class="btn btn-ghost btn-sm danger">Reset ke Default</button>
          <button id="btnCloseMasterHarga" class="btn btn-ghost btn-icon">✕</button>
        </div>
      </div>
      <div id="masterHargaBody" class="modal-body"></div>
    </div>
  </div>

  <!-- ===================== LIBS (export only) ===================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ===================== DATA ===================== -->
  <script src="data/profilBaja.js"></script>
  <script src="data/hargaDefault.js"></script>
  <script src="data/moduleRegistry.js"></script>
  <script src="data/konstantaBeton.js"></script>
  <script src="data/konstantaBaja.js"></script>

  <!-- ===================== UTILS ===================== -->
  <script src="utils/format.js"></script>
  <script src="utils/betonCalc.js"></script>
  <script src="utils/bajaCalc.js"></script>
  <script src="utils/rab.js"></script>
  <script src="utils/aggregate.js"></script>
  <script src="utils/storage.js"></script>
  <script src="utils/simpleModuleFactory.js"></script>

  <!-- ===================== COMPONENTS ===================== -->
  <script src="components/ui.js"></script>
  <script src="components/chart.js"></script>

  <!-- ===================== MODULES: STRUKTUR ===================== -->
  <script src="modules/pondasi.js"></script>
  <script src="modules/sloof.js"></script>
  <script src="modules/kolom.js"></script>
  <script src="modules/balok.js"></script>
  <script src="modules/ringbalok.js"></script>
  <script src="modules/platlantai.js"></script>
  <script src="modules/tangga.js"></script>
  <script src="modules/rangkaAtap.js"></script>

  <!-- ===================== MODULES: ARSITEKTUR / MEP / LUAR ===================== -->
  <script src="modules/dinding.js"></script>
  <script src="modules/plesterAcian.js"></script>
  <script src="modules/lantaiKeramik.js"></script>
  <script src="modules/plafon.js"></script>
  <script src="modules/penutupAtap.js"></script>
  <script src="modules/talang.js"></script>
  <script src="modules/kusenPintuJendela.js"></script>
  <script src="modules/catDinding.js"></script>
  <script src="modules/mep.js"></script>
  <script src="modules/luar.js"></script>

  <!-- ===================== MODULES: REKAPITULASI ===================== -->
  <script src="modules/rekap.js"></script>

  <!-- ===================== APP SHELL ===================== -->
  <script src="script.js"></script>
</body>
</html>
