<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICS Estimator Suite — RAB Konstruksi</title>
<style>
  /* ============================================================
     ICS ESTIMATOR SUITE — Embedded UI (from UI_REFERENCE_SUMMARY)
     Off-white page · White cards · Soft grey borders · Subtle shadow
     Strong black primary buttons · Compact uppercase status pills
     Black rounded icon blocks · Mobile-first card flow
  ============================================================ */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page:       #F5F4F2;
    --bg-card:       #FFFFFF;
    --bg-icon:       #111111;
    --border:        #E2E1DF;
    --shadow:        0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
    --radius-card:   10px;
    --radius-pill:   4px;
    --radius-icon:   8px;
    --radius-btn:    6px;
    --color-text:    #111111;
    --color-muted:   #6B6B6B;
    --color-danger:  #CC2200;
    --color-primary: #111111;
    --color-primary-fg: #FFFFFF;
    --color-secondary-bg: #F0EFED;
    --topbar-h:      52px;
    --sidebar-w:     220px;
    --font:          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-size-base: 13.5px;
    --transition:    0.15s ease;
  }

  [data-theme="dark"] {
    --bg-page:       #18181A;
    --bg-card:       #222224;
    --bg-icon:       #FFFFFF;
    --border:        #303032;
    --shadow:        0 1px 4px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.25);
    --color-text:    #ECECEC;
    --color-muted:   #888888;
    --color-primary: #FFFFFF;
    --color-primary-fg: #111111;
    --color-secondary-bg: #2A2A2C;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    font-size: var(--font-size-base);
    background: var(--bg-page);
    color: var(--color-text);
    -webkit-font-smoothing: antialiased;
  }

  /* ---- TOPBAR ---- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    z-index: 100;
  }

  .topbar-left  { display: flex; align-items: center; gap: 8px; min-width: 0; flex-shrink: 0; }
  .topbar-center { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
  .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .brand {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -.3px;
    color: var(--color-text);
    white-space: nowrap;
  }
  .brand span {
    font-weight: 400;
    color: var(--color-muted);
  }

  .divider {
    display: inline-block;
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 2px;
  }

  /* ---- BUTTONS ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    border: none;
    border-radius: var(--radius-btn);
    cursor: pointer;
    font-family: var(--font);
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1;
    transition: background var(--transition), color var(--transition), opacity var(--transition);
    white-space: nowrap;
    text-decoration: none;
  }
  .btn:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }

  .btn-sm   { height: 28px; padding: 0 10px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; border-radius: var(--radius-btn); flex-shrink: 0; }
  .btn-icon svg { width: 16px; height: 16px; }

  /* Primary — strong black */
  .btn-primary {
    background: var(--color-primary);
    color: var(--color-primary-fg);
  }
  .btn-primary:hover { opacity: .85; }

  /* Secondary — soft grey fill */
  .btn-secondary {
    background: var(--color-secondary-bg);
    color: var(--color-text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  /* Ghost — transparent */
  .btn-ghost {
    background: transparent;
    color: var(--color-text);
  }
  .btn-ghost:hover { background: var(--color-secondary-bg); }

  /* Danger modifier */
  .btn.danger { color: var(--color-danger); }
  .btn.danger:hover { background: #FFF0EE; color: var(--color-danger); }
  [data-theme="dark"] .btn.danger:hover { background: #3A1010; }

  /* ---- PROJECT SELECT ---- */
  .select-project {
    height: 28px;
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    background: var(--bg-card);
    color: var(--color-text);
    font-family: var(--font);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    min-width: 140px;
    max-width: 220px;
  }
  .select-project:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; }

  /* ---- APP BODY ---- */
  .app-body {
    display: flex;
    margin-top: var(--topbar-h);
    min-height: calc(100vh - var(--topbar-h));
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    position: fixed;
    top: var(--topbar-h);
    bottom: 0;
    left: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 0;
    transition: transform var(--transition);
    z-index: 90;
  }
  .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }

  /* Sidebar nav items — rendered by components/ui.js */
  .sidebar-group-label {
    padding: 10px 14px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--color-muted);
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 14px;
    border-radius: 0;
    cursor: pointer;
    color: var(--color-muted);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background var(--transition), color var(--transition);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .sidebar-item:hover { background: var(--color-secondary-bg); color: var(--color-text); }
  .sidebar-item.active { background: var(--color-secondary-bg); color: var(--color-text); }
  .sidebar-item .icon-block {
    width: 24px; height: 24px;
    background: var(--bg-icon);
    border-radius: var(--radius-icon);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sidebar-item .icon-block svg { width: 13px; height: 13px; stroke: var(--color-primary-fg); }
  [data-theme="dark"] .sidebar-item .icon-block svg { stroke: var(--color-primary); }

  /* ---- MAIN CONTENT ---- */
  .main-content {
    flex: 1;
    margin-left: var(--sidebar-w);
    padding: 28px 24px;
    transition: margin-left var(--transition);
    min-width: 0;
  }
  .main-content.full-width { margin-left: 0; }

  /* ---- MODULE HEADER ---- */
  .module-header {
    margin-bottom: 20px;
  }
  .module-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.4px;
    color: var(--color-text);
    line-height: 1.2;
  }
  .muted-note {
    color: var(--color-muted);
    font-size: 12.5px;
    margin-top: 4px;
    line-height: 1.5;
  }

  /* ---- CARDS ---- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--color-muted);
    margin-bottom: 12px;
  }

  /* ---- STATUS PILLS ---- */
  .pill {
    display: inline-flex;
    align-items: center;
    height: 20px;
    padding: 0 7px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    background: var(--color-secondary-bg);
    color: var(--color-muted);
    border: 1px solid var(--border);
  }
  .pill.ok    { background: #E8F5E9; color: #2E7D32; border-color: #C8E6C9; }
  .pill.warn  { background: #FFF8E1; color: #F57F17; border-color: #FFE082; }
  .pill.error { background: #FFEBEE; color: #B71C1C; border-color: #FFCDD2; }
  [data-theme="dark"] .pill.ok    { background: #1B3A1E; color: #66BB6A; border-color: #2E5E30; }
  [data-theme="dark"] .pill.warn  { background: #3A2E0A; color: #FFB300; border-color: #5A460F; }
  [data-theme="dark"] .pill.error { background: #3A1010; color: #EF5350; border-color: #5A1515; }

  /* ---- ALERTS ---- */
  #alertGlobal:not(:empty) {
    margin-bottom: 16px;
  }
  .alert {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-card);
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    margin-bottom: 10px;
  }
  .alert-info  { border-color: #B3D8FF; background: #EAF4FF; color: #0C4A6E; }
  .alert-warn  { border-color: #FFE082; background: #FFFDE7; color: #7A5000; }
  .alert-error { border-color: #FFCDD2; background: #FFEBEE; color: #7F1D1D; }

  /* ---- FORMS / INPUTS ---- */
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-end;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1 1 160px;
    min-width: 0;
  }
  .form-group label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    height: 34px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    background: var(--bg-card);
    color: var(--color-text);
    font-family: var(--font);
    font-size: 13px;
    transition: border-color var(--transition);
  }
  .form-group textarea { height: auto; padding: 8px 10px; resize: vertical; }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--color-primary);
  }

  /* ---- TABLES ---- */
  .ics-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .ics-table th {
    text-align: left;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--color-muted);
    padding: 8px 10px;
    border-bottom: 2px solid var(--border);
    background: var(--bg-page);
  }
  .ics-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .ics-table tr:last-child td { border-bottom: none; }
  .ics-table tr:hover td { background: var(--color-secondary-bg); }
  .ics-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .ics-table tfoot td {
    font-weight: 700;
    border-top: 2px solid var(--border);
    border-bottom: none;
    background: var(--bg-page);
  }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-head h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -.2px;
  }
  .modal-head > div { display: flex; align-items: center; gap: 6px; }
  .modal-body {
    overflow-y: auto;
    padding: 18px;
    flex: 1;
  }

  /* ---- UTILITY ---- */
  .text-right { text-align: right; }
  .text-muted  { color: var(--color-muted); }
  .fw-bold     { font-weight: 700; }
  .mt-0 { margin-top: 0; }
  .mb-0 { margin-bottom: 0; }
  .gap-8 { gap: 8px; }
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .items-center { align-items: center; }

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-muted); }

  /* ---- PRINT ---- */
  @media print {
    .topbar, .sidebar, .btn, #alertGlobal { display: none !important; }
    .main-content { margin-left: 0 !important; padding: 0 !important; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 720px) {
    :root { --sidebar-w: 200px; }
    .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; padding: 16px 14px; }
    .topbar-center { display: none; }
    .topbar-right .btn-sm { display: none; }
    .topbar-right .btn-icon { display: inline-flex; }
  }
</style>
</head>
<body>

  <!-- ===================== TOPBAR ===================== -->
  <header class="topbar">
    <div class="topbar-left">
      <button id="btnSidebarToggle" class="btn btn-ghost btn-icon" title="Tampilkan/sembunyikan menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>

    <div class="topbar-right">

      <button id="btnExportPDF" class="btn btn-ghost btn-sm">PDF</button>
      <button id="btnExportExcel" class="btn btn-ghost btn-sm">Excel</button>
      <button id="btnExportCSV" class="btn btn-ghost btn-sm">CSV</button>
      <button id="btnTheme" class="btn btn-ghost btn-icon" title="Mode gelap/terang">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </header>

  <div class="app-body">
    <!-- ===================== SIDEBAR ===================== -->
    <nav id="sidebar" class="sidebar"></nav>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">
      <div class="module-header">
        <h1 id="moduleTitle">Pondasi Footplat</h1>
        <p id="moduleSubtitle" class="muted-note"></p>
      </div>
      <div id="alertGlobal"></div>
      <div id="mainContent"></div>
    </main>
  </div>

  <!-- ===================== MODAL: MASTER HARGA ===================== -->
  <div id="masterHargaModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-head">
        <h2>Master Harga</h2>
        <div>
          <button id="btnResetHarga" class="btn btn-ghost btn-sm danger">Reset ke Default</button>
          <button id="btnCloseMasterHarga" class="btn btn-ghost btn-icon">✕</button>
        </div>
      </div>
      <div id="masterHargaBody" class="modal-body"></div>
    </div>
  </div>

  <!-- ===================== LIBS (export only) ===================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
